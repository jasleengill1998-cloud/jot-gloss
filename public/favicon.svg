<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle — warm pink -->
  <circle cx="50" cy="50" r="48" fill="#FFE8EE"/>
  <circle cx="50" cy="50" r="45" fill="#FFF4F0" stroke="#C8A878" stroke-width="1.2" opacity="0.8"/>

  <!-- Central bloom — layered rose petals -->
  <g transform="translate(50,44)">
    <!-- Outer petals — soft pink -->
    <ellipse rx="8" ry="16" fill="#F0C0C8" opacity="0.6" transform="rotate(0) translate(0,-4)"/>
    <ellipse rx="8" ry="16" fill="#F0C0C8" opacity="0.6" transform="rotate(60) translate(0,-4)"/>
    <ellipse rx="8" ry="16" fill="#F0C0C8" opacity="0.6" transform="rotate(120) translate(0,-4)"/>
    <ellipse rx="8" ry="16" fill="#F0C0C8" opacity="0.6" transform="rotate(180) translate(0,-4)"/>
    <ellipse rx="8" ry="16" fill="#F0C0C8" opacity="0.6" transform="rotate(240) translate(0,-4)"/>
    <ellipse rx="8" ry="16" fill="#F0C0C8" opacity="0.6" transform="rotate(300) translate(0,-4)"/>
    <!-- Inner petals — deeper rose -->
    <ellipse rx="6" ry="12" fill="#E8A8B8" opacity="0.7" transform="rotate(30) translate(0,-3)"/>
    <ellipse rx="6" ry="12" fill="#E8A8B8" opacity="0.7" transform="rotate(90) translate(0,-3)"/>
    <ellipse rx="6" ry="12" fill="#E8A8B8" opacity="0.7" transform="rotate(150) translate(0,-3)"/>
    <ellipse rx="6" ry="12" fill="#E8A8B8" opacity="0.7" transform="rotate(210) translate(0,-3)"/>
    <ellipse rx="6" ry="12" fill="#E8A8B8" opacity="0.7" transform="rotate(270) translate(0,-3)"/>
    <ellipse rx="6" ry="12" fill="#E8A8B8" opacity="0.7" transform="rotate(330) translate(0,-3)"/>
    <!-- Center -->
    <circle r="6" fill="#F0849C" opacity="0.8"/>
    <circle r="3" fill="#FFD0D8" opacity="0.6"/>
  </g>

  <!-- Tiny leaves -->
  <g opacity="0.7">
    <path d="M30,58 C26,52 28,44 34,42" stroke="#88B890" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="30" cy="50" rx="3" ry="7" fill="#90C898" opacity="0.6" transform="rotate(-30,30,50)"/>
    <path d="M70,58 C74,52 72,44 66,42" stroke="#88B890" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="70" cy="50" rx="3" ry="7" fill="#90C898" opacity="0.6" transform="rotate(30,70,50)"/>
  </g>

  <!-- SB monogram — elegant, centered below bloom -->
  <text x="50" y="78" text-anchor="middle" dominant-baseline="central"
    font-family="Georgia, serif" font-size="18" font-weight="700"
    fill="#5A3E4B" letter-spacing="0.08em" opacity="0.7">SB</text>
</svg>
